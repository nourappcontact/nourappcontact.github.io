<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-deep: #071e0d;
    --green-dark: #0d2e15;
    --teal: #3fb87a;
    --teal-light: #6dcf9a;
    --cream: #f0ebe0;
    --cream-dim: #c8c0ae;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--green-deep); color: var(--cream); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow-x: hidden; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.2rem 4rem; display: flex; justify-content: space-between; align-items: center;
    background: rgba(7,30,13,0.88); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(63,184,122,0.08);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--teal-light); }
  .lang-switcher { display: flex; gap: 0.5rem; }
  .lang-btn {
    background: none; border: 1px solid rgba(63,184,122,0.2); color: var(--cream-dim);
    padding: 0.3rem 0.7rem; border-radius: 100px; font-size: 0.75rem; cursor: pointer;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .lang-btn:hover, .lang-btn.active { background: rgba(63,184,122,0.1); color: var(--teal); border-color: var(--teal); }

  .hero {
    min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
    align-items: center; padding: 8rem 6rem 4rem; gap: 4rem;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(45,122,66,0.14) 0%, transparent 70%);
    right: 0; top: 50%; transform: translateY(-50%); pointer-events: none;
  }
  .hero-arabic-bg {
    position: absolute; font-size: 30rem; color: rgba(63,184,122,0.03);
    font-family: 'Cormorant Garamond', serif; right: -2rem; top: 50%;
    transform: translateY(-50%); pointer-events: none; user-select: none; line-height: 1;
  }
  .hero-content { position: relative; z-index: 2; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    border: 1px solid rgba(63,184,122,0.3); border-radius: 100px;
    padding: 0.4rem 1rem; font-size: 0.72rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--teal); margin-bottom: 2rem;
    animation: fadeUp 0.8s ease both;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
  .hero-name {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(4rem, 7vw, 6.5rem);
    font-weight: 300; line-height: 0.9; margin-bottom: 1.5rem;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .hero-name .arabic { display: block; color: var(--teal-light); font-size: 0.55em; }
  .hero-tagline {
    font-size: 1rem; line-height: 1.75; color: var(--cream-dim); max-width: 400px;
    margin-bottom: 2.5rem; animation: fadeUp 0.8s 0.2s ease both;
  }
  .hero-actions { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; animation: fadeUp 0.8s 0.3s ease both; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.7rem;
    background: var(--teal); color: var(--green-deep); padding: 0.85rem 1.7rem;
    border-radius: 100px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    font-size: 0.9rem; text-decoration: none; transition: all 0.25s ease;
  }
  .btn-primary:hover { background: var(--teal-light); transform: translateY(-2px); }
  .btn-primary svg { width: 18px; height: 18px; }

  .hero-visual { display: flex; justify-content: center; align-items: center; position: relative; z-index: 2; animation: fadeUp 0.8s 0.15s ease both; }
  .phone-frame {
    width: 255px; border-radius: 36px; border: 1.5px solid rgba(63,184,122,0.18);
    overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(63,184,122,0.04);
  }
  .phone-frame img { width: 100%; display: block; }

  .features { padding: 6rem; }
  .section-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.8rem; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 300; line-height: 1.1; margin-bottom: 3rem; }
  .features-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1.5px; background: rgba(63,184,122,0.07);
    border: 1.5px solid rgba(63,184,122,0.07); border-radius: 24px; overflow: hidden;
  }
  .feature-item { background: var(--green-deep); padding: 2rem 1.8rem; transition: background 0.3s; }
  .feature-item:hover { background: rgba(13,46,21,0.9); }
  .feature-icon { font-size: 1.6rem; margin-bottom: 1rem; display: block; }
  .feature-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; margin-bottom: 0.6rem; }
  .feature-desc { font-size: 0.83rem; line-height: 1.7; color: var(--cream-dim); }

  .family-section { padding: 6rem; background: var(--green-dark); }
  .family-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .family-cards { display: flex; flex-direction: column; gap: 1rem; }
  .family-card {
    background: rgba(7,30,13,0.7); border: 1px solid rgba(63,184,122,0.1);
    border-radius: 18px; padding: 1.4rem; display: flex; gap: 1rem; align-items: flex-start;
  }
  .family-card-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(63,184,122,0.08); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .family-card-title { font-size: 0.88rem; font-weight: 500; margin-bottom: 0.25rem; }
  .family-card-desc { font-size: 0.78rem; color: var(--cream-dim); line-height: 1.6; }

  .pricing { padding: 6rem; text-align: center; }
  .price-card {
    max-width: 400px; margin: 2.5rem auto 0; background: var(--green-dark);
    border: 1px solid rgba(63,184,122,0.18); border-radius: 28px; padding: 2.5rem;
    position: relative; overflow: hidden;
  }
  .price-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--teal), transparent); }
  .price-tag { font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-weight: 300; color: var(--teal); line-height: 1; }
  .price-period { font-size: 0.82rem; color: var(--cream-dim); margin-bottom: 2rem; }
  .price-features { list-style: none; text-align: left; margin-bottom: 2rem; }
  .price-features li { padding: 0.55rem 0; font-size: 0.85rem; color: var(--cream-dim); border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 0.75rem; align-items: center; }
  .price-features li::before { content: '✓'; color: var(--teal); font-weight: 500; flex-shrink: 0; }
  .price-trial { font-size: 0.78rem; color: var(--teal-light); margin-top: 1rem; }

  footer { padding: 2.5rem 6rem; border-top: 1px solid rgba(63,184,122,0.07); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--teal-light); }
  .footer-links { display: flex; gap: 2rem; }
  .footer-links a { font-size: 0.78rem; color: var(--cream-dim); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--teal); }
  .footer-copy { font-size: 0.72rem; color: rgba(200,192,174,0.3); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  [dir="rtl"] .hero-tagline, [dir="rtl"] .family-inner, [dir="rtl"] .hero-actions { direction: rtl; }

  @media (max-width: 900px) {
    nav { padding: 1rem 1.5rem; }
    .hero { grid-template-columns: 1fr; padding: 6rem 2rem 3rem; text-align: center; }
    .hero-visual { margin-top: 2rem; }
    .hero-tagline { margin: 0 auto 2rem; }
    .hero-actions { justify-content: center; }
    .features, .family-section, .pricing { padding: 4rem 2rem; }
    .features-grid { grid-template-columns: 1fr; }
    .family-inner { grid-template-columns: 1fr; gap: 3rem; }
    footer { padding: 2rem; flex-direction: column; text-align: center; }
  }
</style>
</head>

function setLang(lang) {
  const t = T[lang];
  document.querySelectorAll('[data-t]').forEach(el => {
    const k = el.getAttribute('data-t');
    if (t[k] !== undefined) el.textContent = t[k];
  });
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
}

const ul = navigator.language || 'es';
setLang(ul.startsWith('ar') ? 'ar' : ul.startsWith('en') ? 'en' : 'es');
